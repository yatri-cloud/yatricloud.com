  <!-- Google Tag Manager + gtag — deferred until load+idle (or first
       interaction). dataLayer stubs queue everything immediately, so no
       events are lost; the ~425 KB of tag JS just stays off the critical
       path (it was the single biggest TBT contributor on mobile). -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-6VPRYNK2TW');
    window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
    (function () {
      var loaded = false;
      function loadTags() {
        if (loaded) return; loaded = true;
        [
          'https://www.googletagmanager.com/gtm.js?id=GTM-KZ4L6JFK',
          'https://www.googletagmanager.com/gtag/js?id=G-6VPRYNK2TW'
        ].forEach(function (src) {
          var s = document.createElement('script');
          s.async = true; s.src = src;
          document.head.appendChild(s);
        });
      }
      function onIdle() {
        if ('requestIdleCallback' in window) requestIdleCallback(loadTags, { timeout: 3000 });
        else setTimeout(loadTags, 1500);
      }
      if (document.readyState === 'complete') onIdle();
      else window.addEventListener('load', onIdle);
      ['pointerdown', 'keydown', 'touchstart', 'scroll'].forEach(function (evt) {
        window.addEventListener(evt, loadTags, { once: true, passive: true });
      });
    })();
  </script>

  <!-- Static-shell paint: styles ONLY the pre-React hero shell below (the
       data-static-shell attribute disappears when React renders, so these
       rules can never fight the compiled CSS). Without this, a refresh in
       dev — or a slow CSS fetch in prod — flashes the shell as bare HTML.
       Values mirror the src/index.css tokens. -->
  <style>
    [data-static-shell] {
      min-height: 100vh;
      background: #fff;
      color: #171717;
      font-family: 'Inter Tight Variable', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    [data-static-shell] section {
      display: flex;
      align-items: center;
      min-height: 100vh;
      padding: 7rem 1rem 6rem;
    }
    [data-static-shell] .container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }
    [data-static-shell] h1 {
      margin: 0 0 1.5rem;
      max-width: 56rem;
      font-family: 'Bricolage Grotesque Variable', 'Inter Tight Variable', system-ui, sans-serif;
      font-size: clamp(2.25rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.02;
      letter-spacing: -0.02em;
    }
    [data-static-shell] h1 span {
      color: #007CFF;
      background: none;
    }
    [data-static-shell] p {
      margin: 0;
      max-width: 42rem;
      font-size: clamp(1.125rem, 2vw, 1.25rem);
      line-height: 1.6;
      color: #616161;
    }
  </style>

  <!-- Static hero shell: paints the real headline + subheadline (the page's
