name: SEO sitemaps

# Regenerate the dynamic sitemaps (blog posts + training courses) daily (and on
# demand), committing only when they change → the commit triggers a Vercel deploy
# so the live sitemaps stay current without any serverless build.

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: seo-sitemaps
  cancel-in-progress: false

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY repo secrets."
            exit 1
          fi
          printf 'SUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" > .env
      - name: Generate sitemaps
        run: |
          node scripts/gen-blog-sitemap.mjs
          node scripts/gen-courses-sitemap.mjs
      - name: Commit if changed
        run: |
          rm -f .env
          if git diff --quiet -- public/sitemap-blog.xml public/sitemap-courses.xml; then
            echo "No sitemap changes."
          else
            git config user.name "yatri-bot"
            git config user.email "bot@yatricloud.com"
            git add public/sitemap-blog.xml public/sitemap-courses.xml
            git commit -m "chore(seo): refresh sitemaps [skip ci]"
            git push
          fi
