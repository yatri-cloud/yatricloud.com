name: CI

# The gate every change passes before Vercel ships it:
#  1. tsc            — type errors
#  2. undefined-JSX  — the class of bug tsc misses (a removed import whose
#                      component is still rendered once white-screened prod)
#  3. vite build     — the real production build
#  4. unit tests     — vitest (hermetic; Supabase degrades to placeholders)
#
# The `e2e` job (Playwright + curriculum integrity) is separate because it hits
# the REAL Supabase and mutates it (creating + deleting throwaway rows that it
# cleans up). It therefore runs only on pushes to main and manual dispatch —
# never on pull requests (fork PRs have no secrets, and we don't touch prod from
# untrusted PRs).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # NOTE: root tsconfig.json is solution-style ("files": [] + references), so a
      # plain `npx tsc --noEmit` type-checks ZERO files and exits 0. Always target
      # the app + node projects explicitly.
      - name: Typecheck (app)
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Typecheck (node)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Undefined-JSX guard
        run: node scripts/check-undefined-jsx.mjs

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          # Public keys only — the build needs them baked in, same as Vercel.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

  # End-to-end + integrity — hits the real Supabase, so keep it off PRs.
  # Requires repo SECRETS: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
  # E2E_ADMIN_EMAIL, E2E_ADMIN_PASSWORD (an admin that signs in with email+pw),
  # and repo VARS: VITE_SUPABASE_* + VITE_GOOGLE_CLIENT_ID (as used by `gate`).
  e2e:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: gate
    # Job-level env so the Playwright webServer (`npm run dev`) inherits it and
    # the app talks to real Supabase instead of falling into legacy mode. URL
    # comes from the SUPABASE_URL secret (always set) so it's never empty; the
    # public keys come from repo vars with a secret fallback.
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
      VITE_USE_SUPABASE: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Fail fast with an actionable message if the app env is missing —
      # otherwise the dev server runs in legacy mode and every Supabase-backed
      # test just times out with no obvious cause.
      - name: Verify app env
        run: |
          test -n "$VITE_SUPABASE_URL" || { echo "::error::VITE_SUPABASE_URL is empty — set the SUPABASE_URL secret or a VITE_SUPABASE_URL repo variable."; exit 1; }
          test -n "$VITE_SUPABASE_ANON_KEY$VITE_SUPABASE_PUBLISHABLE_KEY" || { echo "::error::No Supabase anon/publishable key — set a VITE_SUPABASE_ANON_KEY (or _PUBLISHABLE_KEY) repo variable."; exit 1; }
          test -n "$E2E_ADMIN_EMAIL" || { echo "::error::E2E_ADMIN_EMAIL secret is missing — the admin project needs an email+password admin."; exit 1; }
          echo "app env OK"

      # The integrity script reads .env directly; everything else comes from the
      # job env above (the dev server + Playwright inherit it).
      - name: Write .env (for the integrity script)
        run: printf 'SUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" > .env

      - name: Curriculum integrity
        run: npm run test:integrity

      - name: Playwright (public + admin)
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
